services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: ""
      VITE_API_DISPLAY_URL: "http://localhost:8081"
      VITE_API_PROXY_TARGET: "http://host.docker.internal:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - /app/node_modules
    stdin_open: true
    tty: true

